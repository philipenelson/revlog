packages:
  - "apps/*"
  - "packages/*"
  - "packages/ui/*"

allowBuilds:
  '@prisma/engines': true
  appium: true
  appium-ios-tuntap: true
  bcrypt: true
  cypress: true
  edgedriver: false
  esbuild: true
  geckodriver: false
  prisma: true
  sharp: true
  unrs-resolver: true

minimumReleaseAgeExclude:
  - react-hook-form@7.78.0
  - '@expo/cli@57.0.3'
  - '@expo/fingerprint@0.20.1'
  - '@expo/inline-modules@0.1.1'
  - '@expo/local-build-cache-provider@57.0.1'
  - '@expo/metro-config@57.0.2'
  - '@expo/prebuild-config@57.0.3'
  - '@expo/router-server@57.0.1'
  - appium-ios-remotexpc@5.6.1
  - appium-xcuitest-driver@11.17.1
  - babel-preset-expo@57.0.1
  - expo-asset@57.0.2
  - expo-constants@57.0.2
  - expo-linking@57.0.1
  - expo-modules-autolinking@57.0.3
  - expo-modules-core@57.0.1
  - expo-router@57.0.2
  - expo-splash-screen@57.0.1
  - expo@57.0.1
  - '@expo/metro-runtime@57.0.2'
  - expo-image-picker@57.0.2

# Expo's own tooling deep-imports into metro's internals without declaring
# metro (or metro-cache) as a dependency -- works under npm/yarn's flat
# node_modules by accident, breaks under pnpm's strict linking. This is
# pnpm's sanctioned mechanism for patching a third-party package's own
# dependency list.
packageExtensions:
  '@expo/metro-config':
    dependencies:
      metro-cache: '*'
  '@expo/cli':
    dependencies:
      metro: '*'
  # react-native-worklets' babel plugin (pulled in transitively by
  # babel-preset-expo) requires('@babel/traverse') without declaring it --
  # only surfaces when babel-preset-expo runs under Jest, since Metro's own
  # babel pipeline resolves it some other way.
  react-native-worklets:
    dependencies:
      '@babel/traverse': '*'
