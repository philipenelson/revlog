<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Revlog Mobile — Add Vehicle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --surface-base:     #0B0D14;
    --surface-raised:   #131620;
    --surface-elevated: #1A1D2E;
    --border-muted:   #1E2235;
    --border-default: #2A2E46;
    --border-strong:  #3E4260;
    --text-primary:   #EDF0F8;
    --text-secondary: #8C8FA8;
    --text-tertiary:  #50527A;
    --text-disabled:  #34375A;
    --accent:       #14B8D4;
    --radius-md: 10px;
    --radius-lg: 16px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #15171f; display: flex; gap: 40px; justify-content: center; align-items: flex-start; padding: 40px; font-family: 'DM Sans', system-ui, sans-serif; flex-wrap: wrap; -webkit-font-smoothing: antialiased; }

  .device {
    width: 390px;
    background: var(--surface-base);
    border-radius: 50px;
    overflow: hidden;
    border: 8px solid #1c1e26;
    box-shadow: 0 24px 60px rgba(0,0,0,0.6);
    flex-shrink: 0;
  }
  .label {
    color: var(--text-tertiary);
    font-size: 12px;
    text-align: center;
    margin-bottom: 12px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .status-bar {
    background: var(--surface-base);
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    color: var(--text-primary);
    font-size: 13px;
    font-weight: 600;
  }
  .nav-header {
    background: var(--surface-raised);
    border-bottom: 1px solid var(--border-muted);
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
  }
  .nav-back { color: var(--accent); font-size: 14.5px; display: flex; align-items: center; gap: 4px; font-weight: 500; }
  .nav-title { font-family: 'Outfit', sans-serif; font-size: 15.5px; font-weight: 600; color: var(--text-primary); letter-spacing: -0.01em; }
  .nav-save { color: var(--accent); font-size: 15px; font-weight: 600; }

  .screen-content { height: 700px; background: var(--surface-base); padding: 24px 20px; }

  .field-group { margin-bottom: 16px; }
  .field-row { display: flex; gap: 10px; }
  .field-row .field-group { flex: 1; }
  .field-label { font-size: 11px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.06em; }
  .field-input { background: var(--surface-elevated); border: 1px solid var(--border-default); border-radius: var(--radius-md); padding: 13px 16px; font-size: 14.5px; color: var(--text-primary); }
  .field-input.placeholder { color: var(--text-disabled); }
  .optional-tag { color: var(--text-disabled); font-weight: 400; text-transform: none; letter-spacing: 0; }

  .photo-placeholder {
    height: 120px;
    background: var(--surface-raised);
    border: 1.5px dashed var(--border-strong);
    border-radius: var(--radius-lg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-tertiary);
    margin-bottom: 20px;
    gap: 8px;
  }
  .photo-text { font-size: 11.5px; color: var(--text-tertiary); }
</style>
</head>
<body>

<div>
  <div class="label">Add Vehicle</div>
  <div class="device">
    <div class="status-bar">
      <span class="time">9:41</span>
      <div style="display:flex;gap:6px;align-items:center;"><span>●●●</span><span>WiFi</span><span>▭</span></div>
    </div>
    <div class="nav-header">
      <div class="nav-back">
        <svg width="8" height="14" viewBox="0 0 8 14" fill="none" aria-hidden="true"><path d="M7 1L1 7l6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Garage
      </div>
      <div class="nav-title">Add Vehicle</div>
      <div class="nav-save">Save</div>
    </div>
    <div class="screen-content">
      <div class="photo-placeholder">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" aria-hidden="true"><rect x="2" y="5" width="20" height="15" rx="2.5" stroke="currentColor" stroke-width="1.5"/><circle cx="12" cy="13" r="3.5" stroke="currentColor" stroke-width="1.5"/><path d="M8.5 5l1-2h5l1 2" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
        <span class="photo-text">Photo upload — V2</span>
      </div>

      <div class="field-row">
        <div class="field-group">
          <div class="field-label">Make</div>
          <div class="field-input placeholder">e.g. Honda</div>
        </div>
        <div class="field-group">
          <div class="field-label">Model</div>
          <div class="field-input placeholder">e.g. CB650R</div>
        </div>
      </div>
      <div class="field-row">
        <div class="field-group">
          <div class="field-label">Year</div>
          <div class="field-input placeholder">e.g. 2019</div>
        </div>
        <div class="field-group">
          <div class="field-label">Current mileage</div>
          <div class="field-input placeholder">e.g. 12,500</div>
        </div>
      </div>
      <div class="field-group">
        <div class="field-label">Nickname <span class="optional-tag">(optional)</span></div>
        <div class="field-input placeholder">e.g. Blackbird</div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
