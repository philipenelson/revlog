<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Revlog Mobile — Add Vehicle</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a1a; display: flex; gap: 40px; justify-content: center; align-items: flex-start; padding: 40px; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif; flex-wrap: wrap; }

  .device {
    width: 390px;
    background: #0a0a0a;
    border-radius: 50px;
    overflow: hidden;
    border: 8px solid #2a2a2a;
    box-shadow: 0 24px 60px rgba(0,0,0,0.6);
    flex-shrink: 0;
  }
  .label {
    color: #6b7280;
    font-size: 12px;
    text-align: center;
    margin-bottom: 12px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .status-bar {
    background: #0a0a0a;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    color: #fff;
    font-size: 13px;
    font-weight: 600;
  }
  .nav-header {
    background: #111;
    border-bottom: 1px solid #1f1f1f;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
  }
  .nav-back { color: #3b82f6; font-size: 15px; }
  .nav-title { font-size: 17px; font-weight: 600; color: #fff; }
  .nav-save { color: #3b82f6; font-size: 15px; font-weight: 700; }

  .screen-content {
    height: 700px;
    background: #0f0f0f;
    padding: 24px 20px;
  }

  .field-group { margin-bottom: 16px; }
  .field-row { display: flex; gap: 10px; }
  .field-row .field-group { flex: 1; }
  .field-label {
    font-size: 11px;
    font-weight: 600;
    color: #9ca3af;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .field-input {
    background: #18181b;
    border: 1px solid #27272a;
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 15px;
    color: #f9fafb;
  }
  .field-input.placeholder { color: #4b5563; }
  .optional-tag { color: #4b5563; font-weight: 400; text-transform: none; letter-spacing: 0; }

  .photo-placeholder {
    height: 120px;
    background: #18181b;
    border: 1px dashed #3f3f46;
    border-radius: 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #52525b;
    font-size: 24px;
    margin-bottom: 20px;
    gap: 6px;
  }
  .photo-text { font-size: 12px; color: #52525b; }
</style>
</head>
<body>

<div>
  <div class="label">Add Vehicle</div>
  <div class="device">
    <div class="status-bar">
      <span class="time">9:41</span>
      <div style="display:flex;gap:6px;"><span>●●●</span><span>WiFi</span><span>⬜</span></div>
    </div>
    <div class="nav-header">
      <div class="nav-back">‹ Garage</div>
      <div class="nav-title">Add Vehicle</div>
      <div class="nav-save">Save</div>
    </div>
    <div class="screen-content">
      <div class="photo-placeholder">
        <span>📷</span>
        <span class="photo-text">Photo upload — V2</span>
      </div>

      <div class="field-row">
        <div class="field-group">
          <div class="field-label">Make</div>
          <div class="field-input placeholder">e.g. Honda</div>
        </div>
        <div class="field-group">
          <div class="field-label">Model</div>
          <div class="field-input placeholder">e.g. CB650R</div>
        </div>
      </div>
      <div class="field-row">
        <div class="field-group">
          <div class="field-label">Year</div>
          <div class="field-input placeholder">e.g. 2019</div>
        </div>
        <div class="field-group">
          <div class="field-label">Current mileage</div>
          <div class="field-input placeholder">e.g. 12,500</div>
        </div>
      </div>
      <div class="field-group">
        <div class="field-label">Nickname <span class="optional-tag">(optional)</span></div>
        <div class="field-input placeholder">e.g. Blackbird</div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
