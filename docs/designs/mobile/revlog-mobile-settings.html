<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Revlog Mobile — Settings Screen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --surface-base:     #0B0D14;
    --surface-raised:   #131620;
    --border-muted:   #1E2235;
    --border-default: #2A2E46;
    --text-primary:   #EDF0F8;
    --text-secondary: #8C8FA8;
    --text-tertiary:  #50527A;
    --text-disabled:  #34375A;
    --accent:       #14B8D4;
    --danger:  #F87171;
    --radius-md: 10px;
    --radius-lg: 16px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #15171f; display: flex; gap: 40px; justify-content: center; align-items: flex-start; padding: 40px; font-family: 'DM Sans', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }

  .device {
    width: 390px;
    background: var(--surface-base);
    border-radius: 50px;
    overflow: hidden;
    border: 8px solid #1c1e26;
    box-shadow: 0 24px 60px rgba(0,0,0,0.6);
  }
  .status-bar {
    background: var(--surface-base);
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    color: var(--text-primary);
    font-size: 13px;
    font-weight: 600;
  }
  .nav-header {
    background: var(--surface-raised);
    border-bottom: 1px solid var(--border-muted);
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
  }
  .nav-back { color: var(--accent); font-size: 14.5px; display: flex; align-items: center; gap: 4px; font-weight: 500; }
  .nav-title { font-family: 'Outfit', sans-serif; font-size: 15.5px; font-weight: 600; color: var(--text-primary); letter-spacing: -0.01em; }
  .nav-spacer { width: 40px; }

  .screen-content { height: 700px; background: var(--surface-base); padding: 24px 0; }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-tertiary);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0 20px;
    margin-bottom: 8px;
    margin-top: 24px;
  }
  .section-label:first-child { margin-top: 0; }

  .list-group {
    background: var(--surface-raised);
    border-top: 1px solid var(--border-muted);
    border-bottom: 1px solid var(--border-muted);
    margin-bottom: 4px;
  }
  .list-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border-muted);
  }
  .list-row:last-child { border-bottom: none; }
  .row-label { font-size: 15px; color: var(--text-primary); }
  .row-value { font-size: 13.5px; color: var(--text-tertiary); }
  .row-chevron { color: var(--text-tertiary); display: flex; }
  .row-left { display: flex; flex-direction: column; gap: 2px; }
  .row-sublabel { font-size: 11.5px; color: var(--text-tertiary); }

  .logout-btn {
    margin: 32px 20px 0;
    background: rgba(248,113,113,0.06);
    border: 1px solid rgba(248,113,113,0.25);
    border-radius: var(--radius-lg);
    padding: 15px;
    text-align: center;
    color: var(--danger);
    font-size: 15px;
    font-weight: 600;
  }

  .app-version {
    text-align: center;
    color: var(--text-disabled);
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    margin-top: 28px;
  }
</style>
</head>
<body>

<div class="device">
  <div class="status-bar">
    <span>9:41</span>
    <div style="display:flex;gap:6px;align-items:center;"><span>●●●</span><span>WiFi</span><span>▭</span></div>
  </div>
  <div class="nav-header">
    <div class="nav-back">
      <svg width="8" height="14" viewBox="0 0 8 14" fill="none" aria-hidden="true"><path d="M7 1L1 7l6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Garage
    </div>
    <div class="nav-title">Settings</div>
    <div class="nav-spacer"></div>
  </div>
  <div class="screen-content">

    <div class="section-label">Account</div>
    <div class="list-group">
      <div class="list-row">
        <div class="row-left">
          <div class="row-label">Philip Russo</div>
          <div class="row-sublabel">Display name</div>
        </div>
        <div class="row-value"></div>
      </div>
      <div class="list-row">
        <div class="row-left">
          <div class="row-label">p@example.com</div>
          <div class="row-sublabel">Email</div>
        </div>
        <div class="row-value"></div>
      </div>
    </div>

    <div class="section-label">Legal</div>
    <div class="list-group">
      <div class="list-row">
        <div class="row-label">Terms of Service</div>
        <div class="row-chevron"><svg width="7" height="12" viewBox="0 0 7 12" fill="none" aria-hidden="true"><path d="M1 1l5 5-5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      </div>
      <div class="list-row">
        <div class="row-label">Privacy Policy</div>
        <div class="row-chevron"><svg width="7" height="12" viewBox="0 0 7 12" fill="none" aria-hidden="true"><path d="M1 1l5 5-5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      </div>
      <div class="list-row">
        <div class="row-label">Cookie Policy</div>
        <div class="row-chevron"><svg width="7" height="12" viewBox="0 0 7 12" fill="none" aria-hidden="true"><path d="M1 1l5 5-5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      </div>
    </div>

    <div class="section-label">Support</div>
    <div class="list-group">
      <div class="list-row">
        <div class="row-label">revlog.dev</div>
        <div class="row-chevron"><svg width="7" height="12" viewBox="0 0 7 12" fill="none" aria-hidden="true"><path d="M1 1l5 5-5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      </div>
    </div>

    <div class="logout-btn">Log out</div>

    <div class="app-version">Revlog 1.0.0 (dev.revlog)</div>
  </div>
</div>

</body>
</html>
