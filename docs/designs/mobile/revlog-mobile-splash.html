<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Revlog Mobile — Splash Screen</title>
<style>
  :root {
    --surface-base: #0B0D14;
    --accent:       #14B8D4;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #15171f; display: flex; justify-content: center; align-items: flex-start; padding: 40px; font-family: system-ui, sans-serif; -webkit-font-smoothing: antialiased; }

  .device {
    width: 390px;
    background: var(--surface-base);
    border-radius: 50px;
    overflow: hidden;
    border: 8px solid #1c1e26;
    box-shadow: 0 24px 60px rgba(0,0,0,0.6);
    flex-shrink: 0;
  }
  .label {
    color: #50527A;
    font-size: 12px;
    text-align: center;
    margin-bottom: 12px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  /* No status bar, no safe-area padding: a native splash screen is exactly
     one full-bleed background color plus one centered static image --
     everything inside .scene (mark + wordmark) is baked into that one
     image, there's no separate live text layer. See ADR 0032's 2026-07-13
     update. */
  .scene {
    position: relative;
    height: 800px;
    overflow: hidden;
    background: var(--surface-base);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }
  .wordmark {
    display: flex;
    font-family: 'Outfit', system-ui, sans-serif;
    font-size: 40px;
  }
  .wordmark .rev {
    font-weight: 400;
    color: #EDF0F8;
  }
  .wordmark .log {
    font-weight: 700;
    color: #14B8D4;
  }
</style>
</head>
<body>

<div>
  <div class="label">Splash screen</div>
  <div class="device">
    <div class="scene">
      <svg width="96" height="96" viewBox="0 0 36 36" fill="none" aria-hidden="true">
        <path d="M 11 30 A 14 14 0 1 1 25 30" stroke="#1E2235" stroke-width="3" stroke-linecap="round"/>
        <path d="M 11 30 A 14 14 0 1 1 30.1 11" stroke="#14B8D4" stroke-width="3" stroke-linecap="round"/>
        <line x1="18" y1="18" x2="27.5" y2="13" stroke="#14B8D4" stroke-width="2" stroke-linecap="round"/>
        <circle cx="18" cy="18" r="2.2" fill="#14B8D4"/>
        <circle cx="30.1" cy="11" r="1.5" fill="#F87171" opacity="0.8"/>
      </svg>
      <div class="wordmark"><span class="rev">Rev</span><span class="log">log</span></div>
    </div>
  </div>
</div>

</body>
</html>
