<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Revlog Mobile — Onboarding</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a1a; display: flex; gap: 40px; justify-content: center; align-items: flex-start; padding: 40px; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif; flex-wrap: wrap; }

  .device {
    width: 390px;
    background: #0a0a0a;
    border-radius: 50px;
    overflow: hidden;
    border: 8px solid #2a2a2a;
    box-shadow: 0 24px 60px rgba(0,0,0,0.6);
    flex-shrink: 0;
  }
  .label {
    color: #6b7280;
    font-size: 12px;
    text-align: center;
    margin-bottom: 12px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .status-bar {
    background: #0a0a0a;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    color: #fff;
    font-size: 13px;
    font-weight: 600;
  }

  .screen-content {
    height: 756px;
    background: #0f0f0f;
    padding: 32px 24px 24px;
    overflow: hidden;
  }

  .welcome-block { text-align: center; margin-bottom: 28px; }
  .welcome-icon { font-size: 36px; margin-bottom: 12px; }
  .welcome-title { font-size: 20px; font-weight: 700; color: #f9fafb; margin-bottom: 6px; }
  .welcome-body { font-size: 13px; color: #6b7280; line-height: 1.5; padding: 0 8px; }

  .field-group { margin-bottom: 14px; }
  .field-row { display: flex; gap: 10px; }
  .field-row .field-group { flex: 1; }
  .field-label {
    font-size: 11px;
    font-weight: 600;
    color: #9ca3af;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .field-input {
    background: #18181b;
    border: 1px solid #27272a;
    border-radius: 12px;
    padding: 13px 16px;
    font-size: 14px;
    color: #f9fafb;
  }
  .field-input.placeholder { color: #4b5563; }
  .optional-tag { color: #4b5563; font-weight: 400; text-transform: none; letter-spacing: 0; }

  .primary-btn {
    background: #3b82f6;
    color: #fff;
    padding: 16px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    text-align: center;
    margin-top: 12px;
    box-shadow: 0 8px 24px rgba(59,130,246,0.3);
  }
  .skip-link {
    text-align: center;
    font-size: 13px;
    color: #6b7280;
    margin-top: 16px;
  }

  .progress-dots { display: flex; justify-content: center; gap: 6px; margin-bottom: 24px; }
  .dot { width: 6px; height: 6px; border-radius: 3px; background: #27272a; }
  .dot.active { width: 18px; background: #3b82f6; }
</style>
</head>
<body>

<div>
  <div class="label">Onboarding — add first vehicle</div>
  <div class="device">
    <div class="status-bar">
      <span class="time">9:41</span>
      <div style="display:flex;gap:6px;"><span>●●●</span><span>WiFi</span><span>⬜</span></div>
    </div>
    <div class="screen-content">
      <div class="progress-dots">
        <div class="dot active"></div>
        <div class="dot"></div>
      </div>

      <div class="welcome-block">
        <div class="welcome-icon">🏍</div>
        <div class="welcome-title">Add your first vehicle</div>
        <div class="welcome-body">Tell us a bit about your bike to start tracking its service history.</div>
      </div>

      <div class="field-row">
        <div class="field-group">
          <div class="field-label">Make</div>
          <div class="field-input">Honda</div>
        </div>
        <div class="field-group">
          <div class="field-label">Model</div>
          <div class="field-input">CB650R</div>
        </div>
      </div>
      <div class="field-row">
        <div class="field-group">
          <div class="field-label">Year</div>
          <div class="field-input">2019</div>
        </div>
        <div class="field-group">
          <div class="field-label">Current mileage</div>
          <div class="field-input">12,500</div>
        </div>
      </div>
      <div class="field-group">
        <div class="field-label">Nickname <span class="optional-tag">(optional)</span></div>
        <div class="field-input">Blackbird</div>
      </div>

      <div class="primary-btn">Add my first vehicle</div>
      <div class="skip-link">Skip for now</div>
    </div>
  </div>
</div>

</body>
</html>
